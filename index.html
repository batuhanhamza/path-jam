<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Path Jam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --text-dim: #6b6b88;
    --accent: #7c6af7;
    --accent2: #f76a8a;

    --red: #f74a6a;
    --blue: #4a8af7;
    --green: #4af7a0;
    --yellow: #f7d44a;
    --purple: #c44af7;
    --orange: #f7944a;

    --cell: 56px;
    --gap: 3px;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .tab {
    padding: 7px 20px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 0 0 1px var(--border);
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    width: 100%;
    max-width: 900px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .panel { display: none; width: 100%; flex-direction: column; align-items: center; gap: 28px; }
  .panel.active { display: flex; }

  /* ── GAME LAYOUT ── */
  #game-panel {
    align-items: center;
  }

  .game-inner {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }

  /* ── CANVAS WRAPPER ── */
  #game-panel .canvas-area {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .canvas-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }

  #board-container {
    position: relative;
    padding: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  #board {
    display: grid;
    gap: var(--gap);
  }

  .cell {
    width: var(--cell);
    height: var(--cell);
    border-radius: var(--radius);
    background: var(--surface2);
    border: 1.5px solid var(--border);
    position: relative;
    transition: background 0.18s, border-color 0.18s;
    cursor: default;
  }

  .cell.wall {
    background: var(--bg);
    border-color: var(--bg);
    cursor: default;
    pointer-events: none;
  }

  .cell.drop-target {
    border-color: rgba(124, 106, 247, 0.7);
    box-shadow: inset 0 0 0 2px rgba(124,106,247,0.3);
  }

  .cell.painted {
    border-color: transparent;
  }

  /* ── QUEUE ── */
  .queue-section {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    width: 100%;
  }

  .queue-slots-header {
    display: flex;
    align-items: center;
    padding: 0 2px;
  }

  .queue-slots-wrap {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    justify-content: flex-start;
  }

  .queue-slots-wrap::-webkit-scrollbar { height: 4px; }
  .queue-slots-wrap::-webkit-scrollbar-track { background: transparent; }
  .queue-slots-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .queue-slot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .queue-slot-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .queue-track {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    padding: 10px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-width: 76px;
  }

  .queue-item {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: grab;
    border: 2.5px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    position: relative;
    user-select: none;
    flex-shrink: 0;
  }

  .queue-item:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .queue-item.dragging {
    opacity: 0.35;
    transform: scale(0.95);
  }

  .queue-item.used {
    opacity: 0.2;
    cursor: default;
    pointer-events: none;
  }

  .queue-item-number {
    position: absolute;
    top: -6px;
    left: -6px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    gap: 24px;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .status-item { display: flex; align-items: center; gap: 8px; }
  .status-val {
    color: var(--text);
    font-weight: 700;
    font-size: 14px;
  }

  /* ── WIN/FAIL OVERLAY ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .overlay-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    transform: scale(0.9);
    transition: transform 0.3s;
  }

  .overlay.show .overlay-box { transform: scale(1); }

  .overlay-title {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .overlay-sub {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }

  .btn {
    padding: 11px 28px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s, transform 0.15s;
    margin-top: 8px;
  }

  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn.secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* ── EDITOR ── */
  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
  }

  @media (max-width: 620px) {
    .editor-grid { grid-template-columns: 1fr; }
  }

  .editor-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .editor-section h3 {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  input[type=number], select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=number]:focus, select:focus {
    border-color: var(--accent);
  }

  /* editor mini board */
  #editor-board-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #editor-board {
    display: grid;
    gap: 2px;
  }

  .editor-cell {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-dim);
  }

  .editor-cell:hover { border-color: var(--accent); }
  .editor-cell.wall-cell {
    background: var(--bg);
    border-color: var(--bg);
    color: var(--border);
  }

  .editor-cell.colored-cell {
    border-color: transparent;
  }

  .editor-paint-toolbar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 6px;
  }

  .paint-btn {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .paint-btn.active {
    color: var(--text);
    border-color: currentColor;
    box-shadow: 0 0 0 1px currentColor;
  }

  .paint-btn.erase-btn.active { color: var(--text); border-color: var(--text); }
  .paint-btn.wall-btn.active  { color: var(--text-dim); border-color: var(--border); background: var(--bg); }

  /* queue locked items */
  .queue-item.locked {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }

  .queue-item.next-up {
    box-shadow: 0 0 0 2px currentColor;
  }

  .editor-hint {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
    text-align: center;
  }

  /* queue editor */
  .queue-editor-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .queue-editor-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
  }

  .queue-editor-item .item-preview {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 2px solid transparent;
  }

  .queue-editor-item select {
    padding: 6px 8px;
    font-size: 12px;
  }

  .queue-editor-item .remove-btn {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
    line-height: 1;
  }

  .queue-editor-item .remove-btn:hover { color: var(--accent2); }

  .add-item-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .add-item-row select {
    flex: 1;
    min-width: 80px;
  }

  /* queue editor slots */
  .queue-slots-editor {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .queue-slot-editor {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .queue-slot-editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .queue-slot-editor-title {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .slot-items-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 36px;
  }

  .slot-item-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px 5px 10px;
    border-radius: 6px;
    border: 1.5px solid transparent;
    font-size: 14px;
    cursor: default;
    position: relative;
  }

  .slot-item-chip .chip-remove {
    background: none;
    border: none;
    color: inherit;
    opacity: 0.5;
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    line-height: 1;
    transition: opacity 0.15s;
  }

  .slot-item-chip .chip-remove:hover { opacity: 1; }

  .slot-item-chip.drag-over {
    outline: 2px dashed currentColor;
    outline-offset: 2px;
  }

  /* ── RANDOM SLOT ── */
  .random-slot-config {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .random-slot-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .random-slot-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 44px;
  }

  .random-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    cursor: default;
  }

  .random-tag button {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 0;
    line-height: 1;
  }

  .random-tag button:hover { color: var(--accent2); }

  .slot-type-toggle {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }

  .slot-type-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
  }

  .slot-type-btn.active {
    background: var(--surface2);
    color: var(--text);
  }

  .regenerate-btn {
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--accent);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .regenerate-btn:hover { opacity: 0.7; }

  .slot-add-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .slot-add-row select {
    flex: 1;
    min-width: 70px;
    padding: 6px 8px;
    font-size: 12px;
  }

  .btn-sm {
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 6px;
  }

  /* JSON actions */
  .json-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-icon {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── DRAG GHOST ── */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    width: 60px;
    height: 60px;
    border-radius: 10px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    opacity: 0.95;
    transform: translate(-50%, -50%);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    border: 2.5px solid transparent;
  }

  /* animations */
  @keyframes cellPop {
    0% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  @keyframes fillPulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 1; }
  }

  .cell.just-painted {
    animation: cellPop 0.2s ease-out forwards;
  }

  .cell.just-filled {
    animation: fillPulse 0.35s ease-out forwards;
  }

  /* ── EGO AREA ── */
  .ego-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
  }

  .ego-track {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px dashed var(--accent2);
    border-radius: 10px;
    min-height: 44px;
    align-items: center;
  }

  .ego-label-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ego-badge {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1.5px;
    color: var(--accent2);
    text-transform: uppercase;
  }

  .ego-hint {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
  }

  .ego-track .queue-item {
    width: 48px;
    height: 48px;
    font-size: 18px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">PATH JAM</div>
  <div class="tabs">
    <button class="tab active" data-tab="game">PLAY</button>
    <button class="tab" data-tab="editor">EDITOR</button>
  </div>
</header>

<main>

  <!-- ═══ GAME PANEL ═══ -->
  <div id="game-panel" class="panel active">
    <div class="status-bar">
      <div class="status-item">QUEUE <span class="status-val" id="stat-remaining">—</span></div>
      <div class="status-item">FILLED <span class="status-val" id="stat-filled">0%</span></div>
      <div class="status-item">CELLS <span class="status-val" id="stat-cells">—</span></div>
    </div>

    <div class="game-inner">
      <div class="canvas-area">
        <div class="canvas-label">CANVAS</div>
        <div id="board-container">
          <div id="board"></div>
        </div>
      </div>

      <div class="queue-section" id="queue-section">
        <div class="queue-slots-header">
          <span class="canvas-label">QUEUES</span>
        </div>
        <!-- slots rendered by JS -->
      </div>

      <div>
        <button class="btn secondary" id="btn-restart">↺ RESTART</button>
      </div>

      <div class="ego-section" id="ego-section" style="display:none;">
        <div class="ego-label-row">
          <span class="ego-badge">⟲ EGO</span>
          <span class="ego-hint">place these freely in any order</span>
        </div>
        <div class="ego-track" id="ego-track"></div>
      </div>
    </div>
  </div>

  <!-- ═══ EDITOR PANEL ═══ -->
  <div id="editor-panel" class="panel">
    <div class="editor-grid">

      <!-- Canvas settings -->
      <div class="editor-section">
        <h3>Canvas</h3>
        <div class="field">
          <label>GRID SIZE (N×N)</label>
          <input type="number" id="ed-size" value="5" min="3" max="10">
        </div>
        <button class="btn secondary" id="btn-build-grid" style="margin-top:4px;">BUILD GRID</button>
        <div id="editor-board-wrap">
          <div class="editor-paint-toolbar" id="paint-toolbar">
            <button class="paint-btn erase-btn active" data-mode="erase">✕ erase</button>
            <button class="paint-btn wall-btn" data-mode="wall">▪ wall</button>
          </div>
          <div id="editor-board"></div>
          <div class="editor-hint">Click cells to paint · right-click to erase</div>
        </div>
      </div>

      <!-- Queue settings -->
      <div class="editor-section">
        <h3>Queue Slots</h3>
        <div class="queue-slots-editor" id="queue-slots-editor"></div>
        <button class="btn secondary btn-sm" id="btn-add-slot" style="margin-top:4px;">+ ADD SLOT</button>
      </div>

    </div>

    <div class="json-actions">
      <button class="btn btn-icon" id="btn-apply-level">▶ PLAY THIS LEVEL</button>
      <button class="btn secondary btn-icon" id="btn-download-json">⬇ EXPORT JSON</button>
      <label class="btn secondary btn-icon" style="cursor:pointer;">
        ⬆ IMPORT JSON
        <input type="file" id="input-import-json" accept=".json" style="display:none;">
      </label>
    </div>
  </div>

</main>

<!-- Drag ghost -->
<div id="drag-ghost"></div>

<!-- Overlays -->
<div class="overlay" id="overlay-win">
  <div class="overlay-box">
    <div class="overlay-title" style="background:linear-gradient(135deg,#4af7a0,#4a8af7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">YOU WIN!</div>
    <div class="overlay-sub" id="win-sub">Canvas filled with <span id="win-remaining"></span> items remaining</div>
    <button class="btn" id="btn-win-restart">PLAY AGAIN</button>
  </div>
</div>

<div class="overlay" id="overlay-fail">
  <div class="overlay-box">
    <div class="overlay-title" style="color:var(--accent2);">FAIL</div>
    <div class="overlay-sub">Queue exhausted — canvas not filled</div>
    <button class="btn" id="btn-ego">⟲ TAKE BACK <span id="ego-steps-label">3</span></button>
    <button class="btn" id="btn-ego-solver" style="background:var(--accent);">✦ GET 3 BEST ITEMS</button>
    <button class="btn secondary" id="btn-fail-restart">TRY AGAIN</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════════════

const COLORS = {
  red:    '#f74a6a',
  blue:   '#4a8af7',
  green:  '#4af7a0',
  yellow: '#f7d44a',
  purple: '#c44af7',
  orange: '#f7944a',
};

const DIR_ARROW = { up: '↑', down: '↓', left: '←', right: '→', upleft: '↖', upright: '↗', downleft: '↙', downright: '↘' };
const DIR_DELTA = { up: [-1,0], down: [1,0], left: [0,-1], right: [0,1], upleft: [-1,-1], upright: [-1,1], downleft: [1,-1], downright: [1,1] };

const ANIM_SPEED = 120; // ms per cell
const EGO_STEPS = 3;   // kaç adım geri alınacak — 5 yapmak için sadece bunu değiştir

// levelConfig.queues = array of slots, each slot = array of {color, dir}
let levelConfig = {
  size: 5,
  walls: new Set(),
  queues: [
    [ { color: 'red', dir: 'up' }, { color: 'red', dir: 'right' } ],
    [ { color: 'blue', dir: 'down' }, { color: 'blue', dir: 'left' } ],
    [ { color: 'green', dir: 'right' } ],
  ]
};

// Game state
let gridState   = [];
let lineState   = [];
let queueSlots  = [];
let animating   = false;
let dragItem    = null;

// Ego state
let moveHistory = []; // max EGO_STEPS snapshots
let egoItems    = []; // { color, dir } — items returned by ego
let egoActive   = false;

// Editor state
let editorWalls = new Set();
let editorSize  = 5;
// editorSlots = array of slot arrays
let editorSlots = [];

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════

function key(r, c) { return `${r},${c}`; }
function inBounds(r, c, size) { return r >= 0 && r < size && c >= 0 && c < size; }
function isWall(r, c) { return levelConfig.walls.has(key(r, c)); }
function isPlayable(r, c) { return inBounds(r, c, levelConfig.size) && !isWall(r, c); }

function totalPlayable() {
  const n = levelConfig.size;
  let count = 0;
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      if (!isWall(r, c)) count++;
  return count;
}

function filledCount() {
  const n = levelConfig.size;
  let count = 0;
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      if (!isWall(r, c) && gridState[r][c] !== null) count++;
  return count;
}

function remainingTotal() {
  // Ego aktifken un-use edilen queue item'larını sayma — onlar egoItems'ta
  if (egoActive) return 0;
  return queueSlots.flat().filter(it => !it.used).length;
}

// ═══════════════════════════════════════════════
//  BOARD RENDER
// ═══════════════════════════════════════════════

function buildBoard() {
  const board = document.getElementById('board');
  const n = levelConfig.size;
  board.style.gridTemplateColumns = `repeat(${n}, var(--cell))`;
  board.innerHTML = '';
  gridState = Array.from({length: n}, () => Array(n).fill(null));
  lineState = Array.from({length: n}, () => Array(n).fill(null));

  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.dataset.r = r;
      cell.dataset.c = c;
      if (isWall(r, c)) {
        cell.classList.add('wall');
      }
      board.appendChild(cell);
    }
  }

  // Apply initial pre-colored cells from editor
  const ic = levelConfig.initialColors || {};
  Object.entries(ic).forEach(([k, colorName]) => {
    const [r, c] = k.split(',').map(Number);
    if (!isPlayable(r, c)) return;
    const hex = COLORS[colorName];
    if (!hex) return;
    gridState[r][c] = hex;
    lineState[r][c] = { color: colorName, closed: true }; // treat as filled area
    const el = getCellEl(r, c);
    if (el) {
      el.style.background = hex;
      el.style.borderColor = hex;
      el.classList.add('painted');
    }
  });
}

function getCellEl(r, c) {
  return document.querySelector(`#board .cell[data-r="${r}"][data-c="${c}"]`);
}

function paintCell(r, c, color, pop = false) {
  gridState[r][c] = color;
  const el = getCellEl(r, c);
  if (!el) return;
  el.style.background = color;
  el.style.borderColor = color;
  el.classList.add('painted');
  if (pop) {
    el.classList.remove('just-painted');
    void el.offsetWidth;
    el.classList.add('just-painted');
  }
}

function clearCell(r, c) {
  gridState[r][c] = null;
  const el = getCellEl(r, c);
  if (!el) return;
  el.style.background = '';
  el.style.borderColor = '';
  el.classList.remove('painted', 'just-painted', 'just-filled');
}

function flashFill(cells) {
  cells.forEach(([r, c]) => {
    const el = getCellEl(r, c);
    if (!el) return;
    el.classList.remove('just-filled');
    void el.offsetWidth;
    el.classList.add('just-filled');
  });
}

// ═══════════════════════════════════════════════
//  QUEUE RENDER (multi-slot)
// ═══════════════════════════════════════════════

function buildQueue() {
  const section = document.getElementById('queue-section');
  section.innerHTML = `
    <div class="queue-slots-header">
      <span class="canvas-label">QUEUES</span>
    </div>
    <div class="queue-slots-wrap" id="queue-slots-wrap"></div>
  `;

  queueSlots = levelConfig.queues.map(slot =>
    slot.map(it => ({ ...it, used: false }))
  );

  const wrap = document.getElementById('queue-slots-wrap');

  queueSlots.forEach((slot, slotIdx) => {
    const col = document.createElement('div');
    col.classList.add('queue-slot-col');

    const label = document.createElement('div');
    label.classList.add('queue-slot-label');
    label.textContent = `S${slotIdx + 1}`;

    const track = document.createElement('div');
    track.classList.add('queue-track');
    track.id = `queue-track-${slotIdx}`;

    slot.forEach((item, itemIdx) => {
      track.appendChild(createQueueItemEl(item, slotIdx, itemIdx));
    });

    col.appendChild(label);
    col.appendChild(track);
    wrap.appendChild(col);
  });

  updateStatus();
  setTimeout(refreshQueueVisuals, 0);
}

function createQueueItemEl(item, slotIdx, itemIdx) {
  const el = document.createElement('div');
  el.classList.add('queue-item');
  el.dataset.slot  = slotIdx;
  el.dataset.index = itemIdx;
  el.style.background = COLORS[item.color] + '22';
  el.style.borderColor = COLORS[item.color];
  el.style.color = COLORS[item.color];
  el.innerHTML = `
    <span style="font-size:20px">${DIR_ARROW[item.dir]}</span>
    <div class="queue-item-number">${itemIdx + 1}</div>
  `;
  if (item.used) {
    el.classList.add('used');
  } else {
    attachItemDrag(el, slotIdx, itemIdx);
  }
  return el;
}

function refreshQueueVisuals() {
  queueSlots.forEach((slot, slotIdx) => {
    const firstUnused = slot.findIndex(it => !it.used);
    slot.forEach((item, itemIdx) => {
      const el = document.querySelector(`.queue-item[data-slot="${slotIdx}"][data-index="${itemIdx}"]`);
      if (!el) return;
      el.classList.remove('next-up', 'locked');
      if (item.used) return;
      if (itemIdx === firstUnused) {
        el.classList.add('next-up');
        el.style.cursor = 'grab';
      } else {
        el.classList.add('locked');
      }
    });
  });
}

function markUsed(slotIdx, itemIdx) {
  queueSlots[slotIdx][itemIdx].used = true;
  const el = document.querySelector(`.queue-item[data-slot="${slotIdx}"][data-index="${itemIdx}"]`);
  if (el) {
    el.style.transition = 'opacity 0.2s, transform 0.2s';
    el.style.opacity = '0';
    el.style.transform = 'scale(0.7)';
    setTimeout(() => el.remove(), 220);
  }
  updateStatus();
  setTimeout(refreshQueueVisuals, 230);
}

// ═══════════════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════════════

function updateStatus() {
  const remaining = remainingTotal();
  const total  = totalPlayable();
  const filled = filledCount();
  const pct = total === 0 ? 0 : Math.round(filled / total * 100);
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-filled').textContent = pct + '%';
  document.getElementById('stat-cells').textContent = `${filled}/${total}`;
}

// ═══════════════════════════════════════════════
//  DRAG & DROP — mouse-based (no HTML5 drag API)
// ═══════════════════════════════════════════════

const ghost = document.getElementById('drag-ghost');
let isDragging = false;

function showGhost(colorName, dir) {
  const hex = COLORS[colorName];
  ghost.style.background = hex + '22';
  ghost.style.borderColor = hex;
  ghost.style.color = hex;
  ghost.innerHTML = `<span>${DIR_ARROW[dir]}</span>`;
  ghost.style.display = 'flex';
}

function hideGhost() {
  ghost.style.display = 'none';
}

function moveGhost(x, y) {
  ghost.style.left = x + 'px';
  ghost.style.top  = y + 'px';
}

function getCellAtPoint(x, y) {
  // Hide ghost before hit-testing so it doesn't block elementFromPoint
  ghost.style.display = 'none';
  const el = document.elementFromPoint(x, y);
  // Do NOT re-show here — caller decides visibility
  if (!el) return null;
  const cell = el.closest('.cell');
  if (!cell || cell.classList.contains('wall')) return null;
  return cell;
}

function attachItemDrag(el, slotIdx, itemIdx) {
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (animating) return;
    const item = queueSlots[slotIdx][itemIdx];
    if (item.used) return;
    const firstUnused = queueSlots[slotIdx].findIndex(it => !it.used);
    if (firstUnused !== itemIdx) return;

    e.preventDefault();
    isDragging = true;
    dragItem = { slotIdx, itemIdx, ...item };
    el.classList.add('dragging');
    showGhost(item.color, item.dir);
    moveGhost(e.clientX, e.clientY);
  });
}

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  moveGhost(e.clientX, e.clientY);
  ghost.style.display = 'flex'; // keep visible while moving

  document.querySelectorAll('.cell.drop-target').forEach(c => c.classList.remove('drop-target'));
  const cell = getCellAtPoint(e.clientX, e.clientY);
  ghost.style.display = 'flex'; // restore after hit-test
  if (cell) cell.classList.add('drop-target');
});

document.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;

  // Clean up dragging styles
  document.querySelectorAll('.queue-item.dragging').forEach(c => c.classList.remove('dragging'));
  document.querySelectorAll('.cell.drop-target').forEach(c => c.classList.remove('drop-target'));

  // Hit-test FIRST (hides ghost as side effect), then keep it hidden
  const cell = dragItem && !animating ? getCellAtPoint(e.clientX, e.clientY) : null;
  ghost.style.display = 'none'; // ensure hidden after hit-test

  if (cell && dragItem) {
    const r = parseInt(cell.dataset.r);
    const c = parseInt(cell.dataset.c);
    if (dragItem.isEgo) {
      placeItem(dragItem.slotIdx, 0, r, c, true);
    } else {
      placeItem(dragItem.slotIdx, dragItem.itemIdx, r, c);
    }
  }
  dragItem = null;
});

// ═══════════════════════════════════════════════
//  CORE MECHANICS
// ═══════════════════════════════════════════════

function placeItem(slotIdx, itemIdx, startR, startC, isEgo = false) {
  animating = true;
  const item = isEgo ? egoItems[slotIdx] : queueSlots[slotIdx][itemIdx];
  const color = COLORS[item.color];
  const [dr, dc] = DIR_DELTA[item.dir];

  const path = [];
  let r = startR, c = startC;
  while (isPlayable(r, c)) {
    path.push([r, c]);
    r += dr;
    c += dc;
  }

  if (path.length === 0) { animating = false; return; }

  // Save snapshot before this move (only for non-ego moves)
  if (!isEgo) {
    const snapshot = {
      gridState: gridState.map(row => [...row]),
      lineState: lineState.map(row => row.map(cell => cell ? { ...cell } : null)),
      item: { color: item.color, dir: item.dir },
      slotIdx, itemIdx
    };
    moveHistory.push(snapshot);
    if (moveHistory.length > EGO_STEPS) moveHistory.shift();
  }

  // Snapshot which open-line colors this path crosses BEFORE animation mutates state
  const crossedColors = new Set();
  path.forEach(([pr, pc]) => {
    const ls = lineState[pr][pc];
    if (ls && ls.color !== item.color && !ls.closed) {
      crossedColors.add(ls.color);
    }
  });

  let step = 0;
  function nextStep() {
    if (step >= path.length) {
      processMove(item.color, color, path, crossedColors);
      if (isEgo) {
        egoItems.splice(slotIdx, 1);
        renderEgoArea();
      } else {
        markUsed(slotIdx, itemIdx);
      }
      animating = false;
      checkEndConditions();
      return;
    }
    const [pr, pc] = path[step];
    applyPathCell(pr, pc, color);
    step++;
    setTimeout(nextStep, ANIM_SPEED);
  }
  nextStep();
}

function applyPathCell(r, c, colorHex) {
  // Visual only during animation — don't touch lineState yet
  gridState[r][c] = colorHex;
  const el = getCellEl(r, c);
  if (!el) return;
  el.style.background = colorHex;
  el.style.borderColor = colorHex;
  el.classList.add('painted');
  el.classList.remove('just-painted');
  void el.offsetWidth;
  el.classList.add('just-painted');
}

function processMove(colorName, colorHex, path, crossedColors) {
  // Write path cells FIRST so intersection cells are already the new color
  path.forEach(([r, c]) => {
    gridState[r][c] = colorHex;
    lineState[r][c] = { color: colorName, closed: false };
  });

  // Now destroy crossed open lines — intersection cells are safe because
  // they now belong to colorName, not the destroyed color
  // crossedColors.forEach(dc => destroyLine(dc));

  tryFloodFill(colorName, colorHex);
  updateStatus();
}

function destroyLine(colorName) {
  const colorHex = COLORS[colorName];
  const n = levelConfig.size;
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      const ls = lineState[r][c];
      if (ls && ls.color === colorName && !ls.closed) {
        lineState[r][c] = null;
        clearCell(r, c);
      }
    }
  }
}

// ═══════════════════════════════════════════════
//  FLOOD FILL
// ═══════════════════════════════════════════════

function tryFloodFill(colorName, colorHex) {
  const n = levelConfig.size;

  const blocked = Array.from({length: n}, (_, r) =>
    Array.from({length: n}, (__, c) =>
      gridState[r][c] === colorHex
    )
  );

  const outside = Array.from({length: n}, () => Array(n).fill(false));

  function floodOutside(sr, sc) {
    const stack = [[sr, sc]];
    while (stack.length) {
      const [r, c] = stack.pop();
      if (!inBounds(r, c, n) || outside[r][c] || blocked[r][c]) continue;
      outside[r][c] = true;
      stack.push([r-1,c],[r+1,c],[r,c-1],[r,c+1]);
    }
  }

  for (let r = 0; r < n; r++) {
    if (!blocked[r][0])   floodOutside(r, 0);
    if (!blocked[r][n-1]) floodOutside(r, n-1);
  }
  for (let c = 0; c < n; c++) {
    if (!blocked[0][c])   floodOutside(0, c);
    if (!blocked[n-1][c]) floodOutside(n-1, c);
  }

  const toFill = [];
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      if (!isWall(r,c) && !blocked[r][c] && !outside[r][c] && gridState[r][c] !== colorHex) {
        toFill.push([r, c]);
      }
    }
  }

  if (toFill.length > 0) {
    toFill.forEach(([r, c]) => {
      gridState[r][c] = colorHex;
      lineState[r][c] = { color: colorName, closed: true };
      paintCell(r, c, colorHex);
    });
    flashFill(toFill);
  }
}

// ═══════════════════════════════════════════════
//  END CONDITIONS
// ═══════════════════════════════════════════════

function checkEndConditions() {
  const total  = totalPlayable();
  const filled = filledCount();

  if (filled === total && total > 0) {
    const remaining = remainingTotal() + egoItems.length;
    document.getElementById('win-remaining').textContent = remaining;
    document.getElementById('overlay-win').classList.add('show');
    egoActive = false;
    return;
  }

  const queueDone = egoActive ? egoItems.length === 0 : remainingTotal() === 0;
  if (queueDone && filled < total) {
    if (egoActive && egoItems.length === 0) egoActive = false;
    document.getElementById('overlay-fail').classList.add('show');
  }
}

// ═══════════════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════════════

function startGame() {
  document.getElementById('overlay-win').classList.remove('show');
  document.getElementById('overlay-fail').classList.remove('show');
  animating  = false;
  dragItem   = null;
  moveHistory = [];
  egoItems   = [];
  egoActive  = false;
  document.getElementById('ego-section').style.display = 'none';
  buildBoard();
  buildQueue();
}

// ═══════════════════════════════════════════════
//  EGO
// ═══════════════════════════════════════════════

function activateEgo() {
  document.getElementById('overlay-fail').classList.remove('show');

  const steps = Math.min(EGO_STEPS, moveHistory.length);
  if (steps === 0) { startGame(); return; }

  // Restore state from EGO_STEPS ago
  const target = moveHistory[moveHistory.length - steps];
  gridState = target.gridState.map(row => [...row]);
  lineState = target.lineState.map(row => row.map(cell => cell ? { ...cell } : null));

  // Collect returned items (most recent first → ego area order)
  egoItems = [];
  for (let i = moveHistory.length - steps; i < moveHistory.length; i++) {
    egoItems.push({ color: moveHistory[i].item.color, dir: moveHistory[i].item.dir });
  }

  // Trim history
  moveHistory = moveHistory.slice(0, moveHistory.length - steps);

  // Re-mark queue items as unused for the returned moves
  // (find and un-use them in queueSlots)
  // We need to walk back through and un-use items — simplest: re-check used count
  // Items returned are at the END of their slots, so un-use them
  const returned = egoItems.map((_, i) => {
    const snap = moveHistory.length === 0
      ? null
      : null; // we only need count
    return i;
  });
  // Actually: just un-use the last N used items across all slots
  let toUnuse = steps;
  outer: for (let si = queueSlots.length - 1; si >= 0 && toUnuse > 0; si--) {
    for (let ii = queueSlots[si].length - 1; ii >= 0 && toUnuse > 0; ii--) {
      if (queueSlots[si][ii].used) {
        queueSlots[si][ii].used = false;
        toUnuse--;
      }
    }
  }

  // Repaint board from restored state
  repaintBoard();

  // Show ego area, re-render queues
  egoActive = true;
  updateStatus();
  refreshQueueVisuals();
  renderEgoArea();
  document.getElementById('ego-section').style.display = 'flex';

  // Re-render queue items (restore used → unused visually)
  rebuildQueueVisuals();
}

function rebuildQueueVisuals() {
  // Re-render all queue items based on current queueSlots.used state
  queueSlots.forEach((slot, slotIdx) => {
    slot.forEach((item, itemIdx) => {
      const el = document.querySelector(`.queue-item[data-slot="${slotIdx}"][data-index="${itemIdx}"]`);
      if (!el) return;
      if (!item.used) {
        el.classList.remove('used');
        el.style.opacity = '';
        el.style.transform = '';
      }
    });
  });
  refreshQueueVisuals();
}

function repaintBoard() {
  const n = levelConfig.size;
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      if (isWall(r, c)) continue;
      const color = gridState[r][c];
      const el = getCellEl(r, c);
      if (!el) continue;
      if (color) {
        el.style.background = color;
        el.style.borderColor = color;
        el.classList.add('painted');
      } else {
        el.style.background = '';
        el.style.borderColor = '';
        el.classList.remove('painted', 'just-painted', 'just-filled');
      }
    }
  }
}

function renderEgoArea() {
  const track = document.getElementById('ego-track');
  track.innerHTML = '';

  if (egoItems.length === 0) {
    document.getElementById('ego-section').style.display = 'none';
    return;
  }

  egoItems.forEach((item, idx) => {
    const el = document.createElement('div');
    el.classList.add('queue-item', 'next-up');
    el.style.background = COLORS[item.color] + '22';
    el.style.borderColor = COLORS[item.color];
    el.style.color = COLORS[item.color];
    el.innerHTML = `<span style="font-size:20px">${DIR_ARROW[item.dir]}</span>`;

    // drag — reuse mouse system, mark as ego
    el.addEventListener('mousedown', e => {
      if (e.button !== 0 || animating) return;
      e.preventDefault();
      isDragging = true;
      dragItem = { slotIdx: idx, itemIdx: 0, ...item, isEgo: true };
      el.classList.add('dragging');
      showGhost(item.color, item.dir);
      moveGhost(e.clientX, e.clientY);
    });

    track.appendChild(el);
  });
}

// ═══════════════════════════════════════════════
//  EGO SOLVER
// ═══════════════════════════════════════════════

function getUsedColors() {
  const colors = new Set();
  levelConfig.queues.forEach(slot => slot.forEach(it => colors.add(it.color)));
  return Array.from(colors);
}

function computeBestItems(count) {
  const colors = getUsedColors();
  const dirs = ['up', 'down', 'left', 'right']; // sadece 4 ana yön
  const n = levelConfig.size;

  // Working copies of state — mutated after each greedy step
  let simGrid = gridState.map(row => [...row]);
  let simLine = lineState.map(row => row.map(cell => cell ? { ...cell } : null));

  const picked = [];

  for (let step = 0; step < count; step++) {
    let bestScore = -1;
    let bestItem = null;
    let bestGrid = null;
    let bestLine = null;

    colors.forEach(colorName => {
      const colorHex = COLORS[colorName];
      dirs.forEach(dir => {
        const [dr, dc] = DIR_DELTA[dir];
        for (let r = 0; r < n; r++) {
          for (let c = 0; c < n; c++) {
            if (isWall(r, c)) continue;

            // Build path from this start
            const path = [];
            let pr = r, pc = c;
            while (pr >= 0 && pr < n && pc >= 0 && pc < n && !isWall(pr, pc)) {
              path.push([pr, pc]);
              pr += dr; pc += dc;
            }
            if (path.length === 0) continue;

            // Simulate on current simGrid/simLine copies
            const g = simGrid.map(row => [...row]);
            const l = simLine.map(row => row.map(cell => cell ? { ...cell } : null));

            path.forEach(([pr2, pc2]) => {
              g[pr2][pc2] = colorHex;
              l[pr2][pc2] = { color: colorName, closed: false };
            });

            // Flood fill on g
            const blocked = Array.from({length: n}, (_, rr) =>
              Array.from({length: n}, (__, cc) => g[rr][cc] === colorHex)
            );
            const outside = Array.from({length: n}, () => Array(n).fill(false));

            function floodSim(sr, sc) {
              const stack = [[sr, sc]];
              while (stack.length) {
                const [fr, fc] = stack.pop();
                if (fr < 0 || fr >= n || fc < 0 || fc >= n) continue;
                if (outside[fr][fc] || blocked[fr][fc]) continue;
                outside[fr][fc] = true;
                stack.push([fr-1,fc],[fr+1,fc],[fr,fc-1],[fr,fc+1]);
              }
            }

            for (let rr = 0; rr < n; rr++) {
              if (!blocked[rr][0])   floodSim(rr, 0);
              if (!blocked[rr][n-1]) floodSim(rr, n-1);
            }
            for (let cc = 0; cc < n; cc++) {
              if (!blocked[0][cc])   floodSim(0, cc);
              if (!blocked[n-1][cc]) floodSim(n-1, cc);
            }

            // Count newly filled cells
            let floodFilled = 0;
            for (let rr = 0; rr < n; rr++)
              for (let cc = 0; cc < n; cc++)
                if (!isWall(rr,cc) && !outside[rr][cc] && g[rr][cc] !== colorHex && simGrid[rr][cc] !== colorHex)
                  floodFilled++;

            // Apply flood fill to g
            for (let rr = 0; rr < n; rr++)
              for (let cc = 0; cc < n; cc++)
                if (!isWall(rr,cc) && !outside[rr][cc] && g[rr][cc] !== colorHex) {
                  g[rr][cc] = colorHex;
                  l[rr][cc] = { color: colorName, closed: true };
                }

            const score = path.length + floodFilled * 3;

            if (score > bestScore) {
              bestScore = score;
              bestItem = { color: colorName, dir };
              bestGrid = g;
              bestLine = l;
            }
          }
        }
      });
    });

    if (!bestItem) break;
    picked.push(bestItem);
    simGrid = bestGrid;
    simLine = bestLine;
  }

  return picked;
}

function activateEgoSolver() {
  document.getElementById('overlay-fail').classList.remove('show');

  const bestItems = computeBestItems(EGO_STEPS);
  if (bestItems.length === 0) { startGame(); return; }

  egoItems = bestItems;
  egoActive = true;
  updateStatus();
  renderEgoArea();
  document.getElementById('ego-section').style.display = 'flex';
}

// editorCellColors: Map key -> colorName (for pre-colored cells)
let editorCellColors = new Map();
let paintMode = 'erase'; // 'erase' | 'wall' | colorName
let isPainting = false;

function buildEditorBoard() {
  editorSize = parseInt(document.getElementById('ed-size').value) || 5;
  editorSize = Math.min(10, Math.max(3, editorSize));
  const newWalls = new Set();
  editorWalls.forEach(k => {
    const [r, c] = k.split(',').map(Number);
    if (r < editorSize && c < editorSize) newWalls.add(k);
  });
  editorWalls = newWalls;
  const newColors = new Map();
  editorCellColors.forEach((v, k) => {
    const [r, c] = k.split(',').map(Number);
    if (r < editorSize && c < editorSize) newColors.set(k, v);
  });
  editorCellColors = newColors;

  buildPaintToolbar();

  const board = document.getElementById('editor-board');
  board.style.gridTemplateColumns = `repeat(${editorSize}, 36px)`;
  board.innerHTML = '';

  for (let r = 0; r < editorSize; r++) {
    for (let c = 0; c < editorSize; c++) {
      const cell = document.createElement('div');
      cell.classList.add('editor-cell');
      const k = key(r, c);
      applyEditorCell(cell, k);

      const paint = () => {
        if (paintMode === 'erase') {
          editorWalls.delete(k);
          editorCellColors.delete(k);
        } else if (paintMode === 'wall') {
          editorCellColors.delete(k);
          editorWalls.add(k);
        } else {
          // color mode
          editorWalls.delete(k);
          editorCellColors.set(k, paintMode);
        }
        applyEditorCell(cell, k);
      };

      cell.addEventListener('mousedown', e => { if (e.button !== 0) return; isPainting = true; paint(); });
      cell.addEventListener('mouseover', () => { if (isPainting) paint(); });
      cell.addEventListener('contextmenu', e => {
        e.preventDefault();
        editorWalls.delete(k); editorCellColors.delete(k);
        applyEditorCell(cell, k);
      });
      board.appendChild(cell);
    }
  }
}

function applyEditorCell(cell, k) {
  cell.className = 'editor-cell';
  cell.textContent = '';
  cell.style.background = '';
  cell.style.borderColor = '';
  if (editorWalls.has(k)) {
    cell.classList.add('wall-cell');
    cell.textContent = '✕';
  } else if (editorCellColors.has(k)) {
    const colorName = editorCellColors.get(k);
    const hex = COLORS[colorName];
    cell.classList.add('colored-cell');
    cell.style.background = hex;
    cell.style.borderColor = hex;
  }
}

document.addEventListener('mouseup', () => { isPainting = false; });

function buildPaintToolbar() {
  const toolbar = document.getElementById('paint-toolbar');
  if (!toolbar) return;
  toolbar.innerHTML = '';

  const modes = [
    { mode: 'erase', label: '✕ erase', color: null },
    { mode: 'wall',  label: '▪ wall',  color: null },
    ...Object.keys(COLORS).map(c => ({ mode: c, label: DIR_ARROW.right + ' ' + c, color: COLORS[c] }))
  ];

  modes.forEach(({ mode, label, color }) => {
    const btn = document.createElement('button');
    btn.className = 'paint-btn';
    btn.textContent = label;
    if (color) { btn.style.color = color; btn.style.borderColor = color; }
    if (mode === 'wall') btn.classList.add('wall-btn');
    if (mode === 'erase') btn.classList.add('erase-btn');
    if (paintMode === mode) btn.classList.add('active');
    btn.addEventListener('click', () => {
      paintMode = mode;
      toolbar.querySelectorAll('.paint-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    toolbar.appendChild(btn);
  });
}

let dragSlotIdx = null;
let dragChipIdx = null;
let chipDragOverIdx = null;

// editorSlots entry:
//   manual: { type:'manual', items:[{color,dir},...] }
//   random: { type:'random', count:10, colors:['red','blue'], dirs:['up','down'] }

function generateRandomItems(slot) {
  const { count, colors, dirs } = slot;
  if (!colors.length || !dirs.length || count <= 0) return [];

  // Group dirs by axis
  const vertical   = dirs.filter(d => d === 'up' || d === 'down');
  const horizontal = dirs.filter(d => d === 'left' || d === 'right');
  const diagonal   = dirs.filter(d => ['upleft','upright','downleft','downright'].includes(d));

  // One representative per axis (random from that axis pool)
  const axisGroups = [vertical, horizontal, diagonal].filter(g => g.length > 0);

  const items = [];

  // Guarantee: one of each color (dir from full pool, random)
  colors.forEach(color => {
    const dir = dirs[Math.floor(Math.random() * dirs.length)];
    items.push({ color, dir });
  });

  // Guarantee: one per axis (color random from pool)
  axisGroups.forEach(group => {
    const dir   = group[Math.floor(Math.random() * group.length)];
    const color = colors[Math.floor(Math.random() * colors.length)];
    items.push({ color, dir });
  });

  // Fill remaining randomly
  const remaining = Math.max(0, count - items.length);
  for (let i = 0; i < remaining; i++) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    const dir   = dirs[Math.floor(Math.random() * dirs.length)];
    items.push({ color, dir });
  }

  // Fisher-Yates shuffle
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }

  return items.slice(0, count);
}

function renderEditorSlots() {
  const container = document.getElementById('queue-slots-editor');
  container.innerHTML = '';

  editorSlots.forEach((slot, slotIdx) => {
    const section = document.createElement('div');
    section.classList.add('queue-slot-editor');

    // ── Header with type toggle ──
    const header = document.createElement('div');
    header.classList.add('queue-slot-editor-header');
    const isRandom = slot.type === 'random';

    header.innerHTML = `
      <span class="queue-slot-editor-title">SLOT ${slotIdx + 1}</span>
      <div class="slot-type-toggle">
        <button class="slot-type-btn ${!isRandom ? 'active' : ''}" data-type="manual">MANUAL</button>
        <button class="slot-type-btn ${isRandom ? 'active' : ''}" data-type="random">RANDOM</button>
      </div>
      <button class="remove-btn" data-slot="${slotIdx}" title="Remove slot">✕</button>
    `;
    header.querySelector('.remove-btn').addEventListener('click', () => {
      editorSlots.splice(slotIdx, 1);
      renderEditorSlots();
    });
    header.querySelectorAll('.slot-type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const t = btn.dataset.type;
        if (t === slot.type) return;
        if (t === 'random') {
          editorSlots[slotIdx] = { type: 'random', count: 6, colors: [], dirs: [] };
        } else {
          editorSlots[slotIdx] = { type: 'manual', items: [] };
        }
        renderEditorSlots();
      });
    });

    section.appendChild(header);

    if (isRandom) {
      // ── Random config ──
      const cfg = document.createElement('div');
      cfg.classList.add('random-slot-config');

      // Count input
      const countRow = document.createElement('div');
      countRow.classList.add('random-slot-row');
      countRow.innerHTML = `
        <span class="random-slot-label">COUNT</span>
        <input type="number" min="1" max="30" value="${slot.count}"
          style="width:64px;padding:4px 8px;font-size:12px;" class="rand-count">
      `;
      countRow.querySelector('.rand-count').addEventListener('change', e => {
        editorSlots[slotIdx].count = Math.max(1, parseInt(e.target.value) || 1);
      });

      // Colors row
      const colorRow = document.createElement('div');
      colorRow.classList.add('random-slot-row');
      colorRow.innerHTML = `<span class="random-slot-label">COLORS</span>`;
      slot.colors.forEach((c, ci) => {
        const tag = document.createElement('div');
        tag.classList.add('random-tag');
        tag.style.color = COLORS[c];
        tag.style.borderColor = COLORS[c];
        tag.innerHTML = `${c} <button data-ci="${ci}">✕</button>`;
        tag.querySelector('button').addEventListener('click', () => {
          editorSlots[slotIdx].colors.splice(ci, 1);
          renderEditorSlots();
        });
        colorRow.appendChild(tag);
      });
      const colorAdd = document.createElement('select');
      colorAdd.style.cssText = 'padding:3px 6px;font-size:11px;width:auto;';
      colorAdd.innerHTML = `<option value="">+ color</option>` +
        Object.keys(COLORS).map(c => `<option value="${c}">${c}</option>`).join('');
      colorAdd.addEventListener('change', e => {
        const val = e.target.value;
        if (val && !editorSlots[slotIdx].colors.includes(val)) {
          editorSlots[slotIdx].colors.push(val);
          renderEditorSlots();
        }
        e.target.value = '';
      });
      colorRow.appendChild(colorAdd);

      // Dirs row
      const dirRow = document.createElement('div');
      dirRow.classList.add('random-slot-row');
      dirRow.innerHTML = `<span class="random-slot-label">DIRS</span>`;
      slot.dirs.forEach((d, di) => {
        const tag = document.createElement('div');
        tag.classList.add('random-tag');
        tag.innerHTML = `${DIR_ARROW[d]} <button data-di="${di}">✕</button>`;
        tag.querySelector('button').addEventListener('click', () => {
          editorSlots[slotIdx].dirs.splice(di, 1);
          renderEditorSlots();
        });
        dirRow.appendChild(tag);
      });
      const dirAdd = document.createElement('select');
      dirAdd.style.cssText = 'padding:3px 6px;font-size:11px;width:auto;';
      dirAdd.innerHTML = `<option value="">+ dir</option>` +
        ['up','down','left','right','upleft','upright','downleft','downright']
          .map(d => `<option value="${d}">${DIR_ARROW[d]} ${d}</option>`).join('');
      dirAdd.addEventListener('change', e => {
        const val = e.target.value;
        if (val && !editorSlots[slotIdx].dirs.includes(val)) {
          editorSlots[slotIdx].dirs.push(val);
          renderEditorSlots();
        }
        e.target.value = '';
      });
      dirRow.appendChild(dirAdd);

      // Preview
      const axisCount = [
        slot.dirs.some(d => d==='up'||d==='down') ? 1 : 0,
        slot.dirs.some(d => d==='left'||d==='right') ? 1 : 0,
        slot.dirs.some(d => ['upleft','upright','downleft','downright'].includes(d)) ? 1 : 0,
      ].reduce((a,b) => a+b, 0);
      const minNeeded = slot.colors.length + axisCount;
      const canGenerate = slot.colors.length > 0 && slot.dirs.length > 0 && slot.count >= minNeeded;
      const preview = document.createElement('div');
      preview.style.cssText = 'font-size:10px;font-family:Space Mono,monospace;color:var(--text-dim);margin-top:2px;';
      if (!canGenerate && (slot.colors.length > 0 || slot.dirs.length > 0)) {
        const minCount = Math.max(slot.colors.length + slot.dirs.length, 1);
        preview.textContent = `⚠ min ${minCount} items needed`;
        preview.style.color = 'var(--accent2)';
      } else if (canGenerate) {
        preview.textContent = `→ will generate ${slot.count} items`;
      }

      cfg.appendChild(countRow);
      cfg.appendChild(colorRow);
      cfg.appendChild(dirRow);
      cfg.appendChild(preview);
      section.appendChild(cfg);

    } else {
      // ── Manual: existing chip UI ──
      const chipsList = document.createElement('div');
      chipsList.classList.add('slot-items-list');
      chipsList.dataset.slot = slotIdx;
      const items = slot.items || [];

      items.forEach((item, itemIdx) => {
        const chip = document.createElement('div');
        chip.classList.add('slot-item-chip');
        chip.draggable = true;
        chip.dataset.slot = slotIdx;
        chip.dataset.item = itemIdx;
        chip.style.background = COLORS[item.color] + '22';
        chip.style.borderColor = COLORS[item.color];
        chip.style.color = COLORS[item.color];
        chip.innerHTML = `
          <span class="chip-drag-handle" style="cursor:grab;opacity:0.5;font-size:13px;margin-right:2px;">⠿</span>
          <span>${DIR_ARROW[item.dir]}</span>
          <span style="font-size:11px;font-family:'Space Mono',monospace;">${item.color}</span>
          <button class="chip-remove">✕</button>
        `;
        chip.querySelector('.chip-remove').addEventListener('click', e => {
          e.stopPropagation();
          editorSlots[slotIdx].items.splice(itemIdx, 1);
          renderEditorSlots();
        });
        chip.addEventListener('dragstart', e => {
          dragSlotIdx = slotIdx; dragChipIdx = itemIdx;
          e.dataTransfer.effectAllowed = 'move';
          setTimeout(() => chip.style.opacity = '0.4', 0);
        });
        chip.addEventListener('dragend', () => {
          chip.style.opacity = '';
          document.querySelectorAll('.slot-item-chip.drag-over').forEach(c => c.classList.remove('drag-over'));
          dragSlotIdx = null; dragChipIdx = null;
        });
        chip.addEventListener('dragover', e => {
          e.preventDefault();
          if (dragSlotIdx !== slotIdx) return;
          document.querySelectorAll('.slot-item-chip.drag-over').forEach(c => c.classList.remove('drag-over'));
          chip.classList.add('drag-over');
          chipDragOverIdx = itemIdx;
        });
        chip.addEventListener('drop', e => {
          e.preventDefault();
          if (dragSlotIdx !== slotIdx || dragChipIdx === null || dragChipIdx === itemIdx) return;
          const [moved] = items.splice(dragChipIdx, 1);
          const insertAt = dragChipIdx < itemIdx ? itemIdx - 1 : itemIdx;
          items.splice(insertAt, 0, moved);
          renderEditorSlots();
        });
        chipsList.appendChild(chip);
      });

      chipsList.addEventListener('dragover', e => e.preventDefault());
      chipsList.addEventListener('drop', e => {
        e.preventDefault();
        if (dragSlotIdx !== slotIdx || dragChipIdx === null) return;
        const [moved] = items.splice(dragChipIdx, 1);
        items.push(moved);
        renderEditorSlots();
      });

      const addRow = document.createElement('div');
      addRow.classList.add('slot-add-row');
      addRow.innerHTML = `
        <select class="ed-color-sel">
          ${Object.keys(COLORS).map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
        <select class="ed-dir-sel">
          ${Object.keys(DIR_ARROW).map(d => `<option value="${d}">${DIR_ARROW[d]} ${d}</option>`).join('')}
        </select>
        <button class="btn btn-sm">+ item</button>
      `;
      addRow.querySelector('.btn').addEventListener('click', () => {
        const color = addRow.querySelector('.ed-color-sel').value;
        const dir   = addRow.querySelector('.ed-dir-sel').value;
        if (!editorSlots[slotIdx].items) editorSlots[slotIdx].items = [];
        editorSlots[slotIdx].items.push({ color, dir });
        renderEditorSlots();
      });

      section.appendChild(chipsList);
      section.appendChild(addRow);
    }

    container.appendChild(section);
  });
}

function exportLevel() {
  const data = {
    size: editorSize,
    walls: Array.from(editorWalls),
    initialColors: Object.fromEntries(editorCellColors),
    queues: editorSlots.map(slot => {
      if (slot.type === 'random') {
        return { type: 'random', count: slot.count, colors: slot.colors, dirs: slot.dirs };
      }
      return { type: 'manual', items: (slot.items || []).map(it => ({ color: it.color, dir: it.dir })) };
    })
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'path-jam-level.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importLevel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.size || !data.queues) throw new Error('Invalid format');
      editorSize        = data.size;
      editorWalls       = new Set(data.walls || []);
      editorCellColors  = new Map(Object.entries(data.initialColors || {}));
      // Support old format (array of arrays) and new format
      editorSlots = data.queues.map(slot => {
        if (Array.isArray(slot)) {
          return { type: 'manual', items: slot.map(it => ({ color: it.color, dir: it.dir })) };
        }
        if (slot.type === 'random') {
          return { type: 'random', count: slot.count, colors: slot.colors || [], dirs: slot.dirs || [] };
        }
        return { type: 'manual', items: (slot.items || []).map(it => ({ color: it.color, dir: it.dir })) };
      });
      document.getElementById('ed-size').value = editorSize;
      buildEditorBoard();
      renderEditorSlots();
    } catch(err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

  if (slot.type === 'random') return { type: 'random', count: slot.count, colors: [...slot.colors], dirs: [...slot.dirs] };
  return { type: 'manual', items: (slot.items || slot).map(it => ({ ...it })) };
});
levelConfig = {
  size: editorSize,
  walls: new Set(editorWalls),
  initialColors: DEFAULT_LEVEL.initialColors || {},
  queues: editorSlots.map(s => (s.items || []).map(it => ({ ...it })))
};
document.getElementById('ed-size').value = editorSize;
document.getElementById('ego-steps-label').textContent = EGO_STEPS;
buildEditorBoard();
renderEditorSlots();
startGame();

</script>
